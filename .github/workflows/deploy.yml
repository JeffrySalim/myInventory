name: CI/CD - Build & Deploy


on:
  push:
    branches:
      - main


jobs:
  deploy:
    runs-on: ubuntu-latest


    env:
      # Deployment Configuration - Change image name here
      IMAGE_NAME: spring-deploy-student1-app
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      APP_DIR: /home/student/spring-app/student1 # Sesuaikan dengan direktori di VPS


    steps:
      - name: Checkout source code
        uses: actions/checkout@v4


      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'


      - name: Build application with Maven
        run: mvn clean package -DskipTests


      # 🐳 BUILD & PUSH DOCKER IMAGE
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}


      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest
          cache-to: type=inline


      # � COPY DOCKER-COMPOSE TO VPS
      - name: Copy docker-compose to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "docker-compose.yml"
          target: "${{ env.APP_DIR }}"


      # 🚀 DEPLOY ON VPS (PULL & RUN ONLY)
      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ${{ env.APP_DIR }}
            echo "🚀 Starting deployment..."
            
            echo "✅ Configuration files verified"
            
            # Pull latest image and deploy
            echo "📥 Pulling latest image..."
            docker compose pull
            
            echo "🔄 Restarting services..."
            docker compose down
            docker compose up -d
            
            echo "⏳ Waiting for health check..."
            sleep 10
            
            # Verify deployment
            if docker compose ps | grep -q "Up"; then
              echo "✅ Deployment completed successfully!"
              docker compose ps
            else
              echo "❌ Deployment failed!"
              docker compose logs
              exit 1
            fi
